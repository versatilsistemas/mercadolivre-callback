<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ML Auth Callback</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --yellow: #FFE600;
      --yellow-dim: #ccb800;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --green: #00e676;
      --red: #ff1744;
      --blue: #40c4ff;
      --orange: #ff9100;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,230,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,230,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      animation: slideDown 0.6s ease both;
    }

    .ml-badge {
      background: var(--yellow);
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      padding: 4px 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-title {
      font-size: 13px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Main card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      animation: fadeUp 0.7s ease both 0.1s;
    }

    .status-icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .card-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Code box */
    .code-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--yellow);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .code-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .code-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--yellow);
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--yellow);
      word-break: break-all;
      line-height: 1.6;
      padding-right: 50px;
    }

    /* Copy button */
    .btn-copy {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--yellow);
      color: #000;
      border: none;
      padding: 14px 28px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      width: 100%;
      justify-content: center;
    }

    .btn-copy:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .btn-copy:active {
      transform: translateY(0);
    }

    .btn-copy svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Instruction */
    .instruction {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(255,230,0,0.04);
      border: 1px solid rgba(255,230,0,0.1);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      font-family: 'JetBrains Mono', monospace;
    }

    .instruction strong {
      color: var(--yellow);
    }

    /* Error state */
    .error-box {
      border-left: 3px solid var(--red);
      background: rgba(255,23,68,0.05);
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--red);
    }

    /* Empty state */
    .empty-box {
      border-left: 3px solid var(--muted);
      background: var(--surface2);
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    /* Log / Status panel */
    .log-panel {
      margin-top: 24px;
      border: 1px solid var(--border);
      animation: fadeUp 0.7s ease both 0.3s;
    }

    .log-header {
      background: var(--surface2);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .log-header-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .log-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      background: var(--surface2);
    }

    .log-method {
      font-weight: 700;
      font-size: 10px;
      padding: 2px 8px;
      letter-spacing: 1px;
      min-width: 42px;
      text-align: center;
    }

    .method-get  { background: rgba(64,196,255,0.15); color: var(--blue); }
    .method-post { background: rgba(0,230,118,0.15);  color: var(--green); }
    .method-put  { background: rgba(255,145,0,0.15);  color: var(--orange); }

    .log-url {
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-status {
      font-size: 11px;
      font-weight: 600;
    }

    .status-ok  { color: var(--green); }
    .status-err { color: var(--red); }
    .status-pending { color: var(--yellow); }

    .log-time {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      z-index: 100;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 260px;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-icon {
      color: var(--green);
      font-size: 18px;
    }

    .toast-text strong {
      display: block;
      color: var(--green);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      animation: fadeUp 0.7s ease both 0.4s;
    }

    /* Animations */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="container">
    <div class="header">
      <span class="ml-badge">ML</span>
      <span class="header-title">AUTH CALLBACK</span>
      <div class="divider-line"></div>
    </div>

    <!-- Main Card -->
    <div class="card" id="main-card">
      <!-- Content injected by JS -->
    </div>

    <!-- Log Panel -->
    <div class="log-panel">
      <div class="log-header">
        <div class="dot" id="dot"></div>
        <span class="log-header-title">Request Log</span>
      </div>
      <div class="log-body" id="log-body">
        <!-- Logs injected by JS -->
      </div>
    </div>

    <div class="footer">
      © Integrador ML — Callback Handler
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <div class="toast-text">
      <strong>Copiado!</strong>
      Code copiado para a área de transferência
    </div>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const error   = params.get('error');
    const card    = document.getElementById('main-card');
    const logBody = document.getElementById('log-body');
    const dot     = document.getElementById('dot');
    const now     = new Date().toLocaleTimeString('pt-BR');
    const origin  = window.location.origin + window.location.pathname;

    // ---------- Render card ----------
    if (code) {
      dot.style.background = 'var(--green)';
      card.innerHTML = `
        <span class="status-icon">✅</span>
        <div class="card-title">Autenticado!</div>
        <p class="card-subtitle">
          O Mercado Livre retornou o código de autorização.<br>
          Cole-o no integrador para concluir a autenticação.
        </p>
        <div class="code-label">Authorization Code</div>
        <div class="code-wrapper">
          <div class="code-box" id="code-display">${code}</div>
        </div>
        <button class="btn-copy" onclick="copiar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar Code para o Integrador
        </button>
        <div class="instruction">
          <strong>⚠ Atenção:</strong> este code expira em poucos minutos.<br>
          Cole imediatamente no campo <strong>"Authorization Code"</strong> do integrador.
        </div>
      `;
      addLog('GET', origin, '200 OK', 'status-ok', now);
      addLog('GET', `https://auth.mercadolivre.com.br/authorization?response_type=code&...`, '302 Redirect', 'status-ok', now);

    } else if (error) {
      dot.style.background = 'var(--red)';
      dot.style.animation  = 'none';
      card.innerHTML = `
        <span class="status-icon">❌</span>
        <div class="card-title">Falha na autenticação</div>
        <p class="card-subtitle">O Mercado Livre retornou um erro durante a autorização.</p>
        <div class="code-label">Erro retornado</div>
        <div class="error-box">${error}</div>
      `;
      addLog('GET', origin, '400 Error', 'status-err', now);

    } else {
      dot.style.background = 'var(--yellow)';
      card.innerHTML = `
        <span class="status-icon">⏳</span>
        <div class="card-title">Aguardando...</div>
        <p class="card-subtitle">
          Nenhum código foi recebido ainda.<br>
          Esta página deve ser acessada pelo fluxo OAuth do integrador.
        </p>
        <div class="empty-box">
          Acesse esta URL via integrador → clique em "Autenticar com Mercado Livre"
        </div>
      `;
      addLog('GET', origin, 'Aguardando', 'status-pending', now);
    }

    // ---------- Add log row ----------
    function addLog(method, url, status, statusClass, time) {
      const methodClass = {
        GET:  'method-get',
        POST: 'method-post',
        PUT:  'method-put',
      }[method] || 'method-get';

      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = `
        <span class="log-method ${methodClass}">${method}</span>
        <span class="log-url" title="${url}">${url}</span>
        <span class="log-status ${statusClass}">${status}</span>
        <span class="log-time">${time}</span>
      `;
      logBody.appendChild(row);
    }

    // ---------- Copy ----------
    function copiar() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        showToast();
      }).catch(() => {
        // Fallback
        const el = document.createElement('textarea');
        el.value = code;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast();
      });
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
