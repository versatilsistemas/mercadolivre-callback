<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ML Callback</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f8;
      --surface: #ffffff;
      --border: #e8e8e5;
      --text: #1a1a18;
      --muted: #9a9a94;
      --yellow: #f5c800;
      --green: #2d8a4e;
      --green-bg: #f0faf4;
      --red: #c0392b;
      --red-bg: #fdf3f2;
      --blue: #1a5fa8;
      --blue-bg: #f0f6ff;
      --orange: #c46b00;
      --orange-bg: #fff8ef;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap { width: 100%; max-width: 520px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .ml-dot {
      width: 28px; height: 28px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 10px; font-weight: 500; color: #000;
    }

    .brand-name { font-size: 13px; font-weight: 500; letter-spacing: -0.2px; }

    .timestamp { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 12px;
    }

    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
      font-family: var(--mono); letter-spacing: 0.2px;
    }

    .badge-ok   { background: var(--green-bg); color: var(--green); }
    .badge-err  { background: var(--red-bg);   color: var(--red); }
    .badge-wait { background: #f5f5f3;          color: var(--muted); }

    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    .card-title { font-size: 20px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 6px; }

    .card-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }

    .field-label {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px;
    }

    .code-field {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; font-family: var(--mono); font-size: 12px;
      color: var(--text); word-break: break-all; line-height: 1.7; margin-bottom: 12px;
    }

    .btn {
      width: 100%; background: var(--text); color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-family: var(--sans);
      font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: opacity 0.15s; letter-spacing: -0.1px;
    }

    .btn:hover { opacity: 0.82; }
    .btn:active { opacity: 0.7; }
    .btn svg { width: 14px; height: 14px; }

    .note {
      margin-top: 14px; font-size: 12px; color: var(--muted); line-height: 1.6;
      padding: 10px 14px; background: var(--bg); border-radius: 7px;
    }

    .note strong { color: var(--text); font-weight: 500; }

    .error-field {
      background: var(--red-bg); border: 1px solid #f5c8c5; border-radius: 8px;
      padding: 12px 14px; font-family: var(--mono); font-size: 12px; color: var(--red);
    }

    .log-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }

    .log-head {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      letter-spacing: 0.8px; text-transform: uppercase;
    }

    .live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); animation: blink 2s infinite;
    }

    .log-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; font-family: var(--mono); font-size: 11px;
      border-bottom: 1px solid var(--border);
    }

    .log-row:last-child { border-bottom: none; }

    .method-tag {
      font-size: 10px; font-weight: 500; padding: 2px 7px;
      border-radius: 4px; min-width: 38px; text-align: center; letter-spacing: 0.3px;
    }

    .m-get    { background: var(--blue-bg);   color: var(--blue); }
    .m-post   { background: var(--green-bg);  color: var(--green); }
    .m-put    { background: var(--orange-bg); color: var(--orange); }

    .log-url {
      flex: 1; color: var(--muted); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; font-size: 10px;
    }

    .s-ok   { color: var(--green); font-size: 10px; }
    .s-err  { color: var(--red);   font-size: 10px; }
    .s-pend { color: var(--muted); font-size: 10px; }

    .log-time { color: var(--muted); font-size: 10px; white-space: nowrap; }

    .origin-row {
      padding: 8px 16px; border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }

    .origin-label { color: var(--text); font-weight: 500; }

    .footer {
      text-align: center; margin-top: 20px;
      font-size: 11px; color: var(--muted); font-family: var(--mono);
    }

    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      transform: translateY(12px); opacity: 0;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; z-index: 99;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    .toast-icon {
      width: 20px; height: 20px; background: var(--green-bg);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: var(--green); font-size: 11px; flex-shrink: 0;
    }

    .toast-text { font-size: 13px; font-weight: 500; color: var(--text); }
    .toast-sub  { font-size: 11px; color: var(--muted); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <div class="brand">
        <div class="ml-dot">ML</div>
        <span class="brand-name">Auth Callback</span>
      </div>
      <span class="timestamp" id="ts"></span>
    </div>

    <div class="card" id="card"></div>

    <div class="log-card">
      <div class="log-head">
        <div class="live-dot" id="live-dot"></div>
        request log
      </div>
      <div id="log-rows"></div>
      <div class="origin-row">
        <span class="origin-label">origin</span>
        <span id="origin-url"></span>
      </div>
    </div>

    <div class="footer">Integrador ML &mdash; OAuth Callback</div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <div>
      <div class="toast-text">Copiado!</div>
      <div class="toast-sub">Code na área de transferência</div>
    </div>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const error   = params.get('error');
    const card    = document.getElementById('card');
    const now     = new Date();
    const timeStr = now.toLocaleTimeString('pt-BR');

    document.getElementById('ts').textContent = now.toLocaleString('pt-BR');
    document.getElementById('origin-url').textContent = window.location.origin + window.location.pathname;

    const dot = document.getElementById('live-dot');

    if (code) {
      dot.style.background = '#2d8a4e';
      card.innerHTML = `
        <div class="status-row">
          <span class="status-badge badge-ok"><span class="badge-dot"></span>autorizado</span>
        </div>
        <div class="card-title">Code recebido</div>
        <p class="card-sub">O Mercado Livre retornou o código de autorização.<br>Cole-o no integrador para concluir.</p>
        <div class="field-label">Authorization Code</div>
        <div class="code-field">${code}</div>
        <button class="btn" onclick="copiar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar code
        </button>
        <div class="note"><strong>Atenção:</strong> este code expira em minutos. Cole imediatamente no integrador.</div>
      `;
      addLog('GET', window.location.href, '200', 'ok');
      addLog('GET', 'https://auth.mercadolivre.com.br/authorization?...', '302', 'ok');
      navigator.clipboard.writeText(code).then(showToast).catch(() => {});

    } else if (error) {
      dot.style.background = '#c0392b';
      dot.style.animation  = 'none';
      card.innerHTML = `
        <div class="status-row">
          <span class="status-badge badge-err"><span class="badge-dot"></span>erro</span>
        </div>
        <div class="card-title">Falha na autenticação</div>
        <p class="card-sub">O Mercado Livre retornou um erro durante a autorização.</p>
        <div class="field-label">Erro</div>
        <div class="error-field">${error}</div>
      `;
      addLog('GET', window.location.href, '400', 'err');

    } else {
      dot.style.background = '#9a9a94';
      dot.style.animation  = 'none';
      card.innerHTML = `
        <div class="status-row">
          <span class="status-badge badge-wait"><span class="badge-dot"></span>aguardando</span>
        </div>
        <div class="card-title">Nenhum code recebido</div>
        <p class="card-sub">Esta página deve ser acessada via fluxo OAuth do integrador.</p>
        <div class="note">Clique em <strong>"Autenticar com Mercado Livre"</strong> no integrador para iniciar.</div>
      `;
      addLog('GET', window.location.href, '—', 'pend');
    }

    function addLog(method, url, status, type) {
      const mClass = { GET: 'm-get', POST: 'm-post', PUT: 'm-put' }[method] || 'm-get';
      const sClass = { ok: 's-ok', err: 's-err', pend: 's-pend' }[type];
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = `
        <span class="method-tag ${mClass}">${method}</span>
        <span class="log-url" title="${url}">${url}</span>
        <span class="${sClass}">${status}</span>
        <span class="log-time">${timeStr}</span>
      `;
      document.getElementById('log-rows').appendChild(row);
    }

    function copiar() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(showToast).catch(() => {
        const t = document.createElement('textarea');
        t.value = code; document.body.appendChild(t); t.select();
        document.execCommand('copy'); document.body.removeChild(t);
        showToast();
      });
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
